<!DOCTYPE html>
<html>
<head>
    <title>Update Fruit Dictionary</title>
</head>
<body>
    <h1>Fruit Dictionary Updater</h1>

    <form id="fruitForm">
        <label for="key">Number (Key):</label>
        <input type="number" id="key" required>
        <br><br>

        <label for="value">Fruit Name (Value):</label>
        <input type="text" id="value" required>
        <br><br>

        <button type="submit">Add/Update Fruit</button>
    </form>

    <h2>Updated Fruit Dictionary:</h2>
    <pre id="result">{}</pre>

    <script>
        const form = document.getElementById('fruitForm');
        const result = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const key = document.getElementById('key').value;
            const value = document.getElementById('value').value;

            // Prepare JSON data
            const data = {};
            data[key] = value;

            try {
                const response = await fetch('http://127.0.0.1:8000/postlukhman/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const resultData = await response.json();
                result.textContent = JSON.stringify(resultData.data, null, 2);

            } catch (error) {
                console.error("Error:", error);
            }
        });
    </script>
</body>
</html>
